<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Diffusion guidance evolution timeline</title>
  <desc id="desc">A four-step timeline showing unconditional diffusion, classifier guidance, classifier-free guidance, and distillation/few-step models.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f3ea"/>
      <stop offset="100%" stop-color="#eef4f1"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#335c67"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="560" fill="url(#bg)"/>
  <text x="80" y="80" fill="#102a43" font-size="34" font-family="Helvetica, Arial, sans-serif" font-weight="700">
    From Unconditional Diffusion to CFG and Distillation
  </text>
  <text x="80" y="118" fill="#486581" font-size="20" font-family="Helvetica, Arial, sans-serif">
    A compact view of how conditioning and guidance evolved in diffusion models
  </text>

  <line x1="120" y1="280" x2="1080" y2="280" stroke="#335c67" stroke-width="8" stroke-linecap="round" marker-end="url(#arrow)"/>

  <circle cx="190" cy="280" r="18" fill="#335c67"/>
  <circle cx="450" cy="280" r="18" fill="#335c67"/>
  <circle cx="720" cy="280" r="18" fill="#335c67"/>
  <circle cx="980" cy="280" r="18" fill="#335c67"/>

  <rect x="90" y="160" width="200" height="92" rx="18" fill="#fff7e6" stroke="#c05621" stroke-width="2"/>
  <text x="118" y="197" fill="#7b341e" font-size="24" font-family="Helvetica, Arial, sans-serif" font-weight="700">2020</text>
  <text x="118" y="228" fill="#7b341e" font-size="22" font-family="Helvetica, Arial, sans-serif">DDPM / p(x)</text>

  <rect x="350" y="145" width="210" height="110" rx="18" fill="#edf2ff" stroke="#364fc7" stroke-width="2"/>
  <text x="378" y="182" fill="#243c5a" font-size="24" font-family="Helvetica, Arial, sans-serif" font-weight="700">2021</text>
  <text x="378" y="214" fill="#243c5a" font-size="22" font-family="Helvetica, Arial, sans-serif">Classifier</text>
  <text x="378" y="241" fill="#243c5a" font-size="22" font-family="Helvetica, Arial, sans-serif">Guidance</text>

  <rect x="615" y="135" width="220" height="120" rx="18" fill="#e6fffa" stroke="#0f766e" stroke-width="2"/>
  <text x="644" y="172" fill="#134e4a" font-size="24" font-family="Helvetica, Arial, sans-serif" font-weight="700">2021 / 2022</text>
  <text x="644" y="204" fill="#134e4a" font-size="22" font-family="Helvetica, Arial, sans-serif">Classifier-Free</text>
  <text x="644" y="231" fill="#134e4a" font-size="22" font-family="Helvetica, Arial, sans-serif">Guidance</text>

  <rect x="900" y="150" width="180" height="102" rx="18" fill="#f3e8ff" stroke="#7e22ce" stroke-width="2"/>
  <text x="928" y="187" fill="#581c87" font-size="24" font-family="Helvetica, Arial, sans-serif" font-weight="700">2022+</text>
  <text x="928" y="219" fill="#581c87" font-size="22" font-family="Helvetica, Arial, sans-serif">Distillation</text>
  <text x="928" y="246" fill="#581c87" font-size="22" font-family="Helvetica, Arial, sans-serif">Few-step</text>

  <rect x="70" y="330" width="240" height="130" rx="18" fill="#ffffff" stroke="#d9e2ec"/>
  <text x="96" y="365" fill="#102a43" font-size="20" font-family="Helvetica, Arial, sans-serif" font-weight="700">Unconditional start</text>
  <text x="96" y="397" fill="#486581" font-size="18" font-family="Helvetica, Arial, sans-serif">Learns only what natural</text>
  <text x="96" y="423" fill="#486581" font-size="18" font-family="Helvetica, Arial, sans-serif">samples look like.</text>

  <rect x="330" y="330" width="250" height="130" rx="18" fill="#ffffff" stroke="#d9e2ec"/>
  <text x="356" y="365" fill="#102a43" font-size="20" font-family="Helvetica, Arial, sans-serif" font-weight="700">Add an external classifier</text>
  <text x="356" y="397" fill="#486581" font-size="18" font-family="Helvetica, Arial, sans-serif">Guide sampling with</text>
  <text x="356" y="423" fill="#486581" font-size="18" font-family="Helvetica, Arial, sans-serif">gradients on noisy inputs.</text>

  <rect x="600" y="330" width="250" height="130" rx="18" fill="#ffffff" stroke="#d9e2ec"/>
  <text x="626" y="365" fill="#102a43" font-size="20" font-family="Helvetica, Arial, sans-serif" font-weight="700">Use one model twice</text>
  <text x="626" y="397" fill="#486581" font-size="18" font-family="Helvetica, Arial, sans-serif">Conditional minus</text>
  <text x="626" y="423" fill="#486581" font-size="18" font-family="Helvetica, Arial, sans-serif">unconditional = guidance.</text>

  <rect x="870" y="330" width="260" height="130" rx="18" fill="#ffffff" stroke="#d9e2ec"/>
  <text x="896" y="365" fill="#102a43" font-size="20" font-family="Helvetica, Arial, sans-serif" font-weight="700">Bake guidance into students</text>
  <text x="896" y="397" fill="#486581" font-size="18" font-family="Helvetica, Arial, sans-serif">Compress many-step guided</text>
  <text x="896" y="423" fill="#486581" font-size="18" font-family="Helvetica, Arial, sans-serif">sampling into few steps.</text>
</svg>
