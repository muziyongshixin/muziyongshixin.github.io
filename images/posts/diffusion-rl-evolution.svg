<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Diffusion RL evolution timeline</title>
  <desc id="desc">Timeline from ImageReward and DDPO in 2023 to Flow-GRPO and 2026 efficiency-focused methods.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <style>
      .title { font: 700 28px 'Helvetica Neue', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 15px 'Helvetica Neue', Arial, sans-serif; fill: #334155; }
      .year { font: 700 18px 'Helvetica Neue', Arial, sans-serif; fill: #0f172a; }
      .label { font: 700 15px 'Helvetica Neue', Arial, sans-serif; fill: #0f172a; }
      .small { font: 400 13px 'Helvetica Neue', Arial, sans-serif; fill: #334155; }
      .tiny { font: 400 12px 'Helvetica Neue', Arial, sans-serif; fill: #475569; }
      .axis { stroke: #94a3b8; stroke-width: 4; stroke-linecap: round; }
      .grid { stroke: #cbd5e1; stroke-width: 1; stroke-dasharray: 5 6; }
    </style>
  </defs>

  <rect width="1200" height="520" fill="url(#bg)"/>
  <text x="60" y="54" class="title">Diffusion RL: major turns from 2023 to 2026</text>
  <text x="60" y="80" class="subtitle">The field started by treating denoising as decision making, then split by feedback type, and later expanded to flow matching and efficiency.</text>

  <line x1="90" y1="250" x2="1110" y2="250" class="axis"/>

  <line x1="270" y1="140" x2="270" y2="380" class="grid"/>
  <line x1="520" y1="140" x2="520" y2="380" class="grid"/>
  <line x1="800" y1="140" x2="800" y2="380" class="grid"/>
  <line x1="1030" y1="140" x2="1030" y2="380" class="grid"/>

  <text x="145" y="290" class="year">2023</text>
  <text x="405" y="290" class="year">2024</text>
  <text x="690" y="290" class="year">2025</text>
  <text x="970" y="290" class="year">2026</text>

  <circle cx="170" cy="250" r="10" fill="#2563eb"/>
  <rect x="110" y="118" width="180" height="92" rx="16" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="128" y="145" class="label">ImageReward / ReFL</text>
  <text x="128" y="167" class="small">reward model enters</text>
  <text x="128" y="187" class="small">text-to-image alignment</text>
  <text x="128" y="205" class="tiny">Apr 2023</text>

  <circle cx="245" cy="250" r="10" fill="#0f766e"/>
  <rect x="200" y="302" width="180" height="96" rx="16" fill="#ccfbf1" stroke="#2dd4bf"/>
  <text x="218" y="329" class="label">DDPO / DPOK</text>
  <text x="218" y="351" class="small">denoising becomes</text>
  <text x="218" y="371" class="small">policy optimization</text>
  <text x="218" y="389" class="tiny">May 2023</text>

  <circle cx="390" cy="250" r="10" fill="#ea580c"/>
  <rect x="342" y="118" width="196" height="92" rx="16" fill="#ffedd5" stroke="#fb923c"/>
  <text x="360" y="145" class="label">DRaFT / AlignProp</text>
  <text x="360" y="167" class="small">reward backprop for</text>
  <text x="360" y="187" class="small">differentiable objectives</text>
  <text x="360" y="205" class="tiny">Sep-Oct 2023</text>

  <circle cx="505" cy="250" r="10" fill="#7c3aed"/>
  <rect x="452" y="302" width="196" height="96" rx="16" fill="#ede9fe" stroke="#a78bfa"/>
  <text x="470" y="329" class="label">Diffusion-DPO / D3PO</text>
  <text x="470" y="351" class="small">pairwise preferences,</text>
  <text x="470" y="371" class="small">no explicit reward model</text>
  <text x="470" y="389" class="tiny">Nov 2023</text>

  <circle cx="610" cy="250" r="10" fill="#dc2626"/>
  <rect x="575" y="118" width="205" height="92" rx="16" fill="#fee2e2" stroke="#f87171"/>
  <text x="593" y="145" class="label">InstructVideo</text>
  <text x="593" y="167" class="small">video reward tuning with</text>
  <text x="593" y="187" class="small">segmental temporal rewards</text>
  <text x="593" y="205" class="tiny">Dec 2023 / CVPR 2024</text>

  <circle cx="725" cy="250" r="10" fill="#be123c"/>
  <rect x="670" y="302" width="210" height="96" rx="16" fill="#ffe4e6" stroke="#fb7185"/>
  <text x="688" y="329" class="label">Video Reward Gradients</text>
  <text x="688" y="351" class="small">direct backprop extends</text>
  <text x="688" y="371" class="small">from images to video</text>
  <text x="688" y="389" class="tiny">Jul 2024</text>

  <circle cx="860" cy="250" r="10" fill="#1d4ed8"/>
  <rect x="790" y="118" width="220" height="92" rx="16" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="808" y="145" class="label">Flow-GRPO</text>
  <text x="808" y="167" class="small">ODE-to-SDE conversion</text>
  <text x="808" y="187" class="small">brings RL to flow matching</text>
  <text x="808" y="205" class="tiny">Sep 2025 / NeurIPS 2025</text>

  <circle cx="1010" cy="250" r="10" fill="#15803d"/>
  <rect x="930" y="302" width="218" height="96" rx="16" fill="#dcfce7" stroke="#4ade80"/>
  <text x="948" y="329" class="label">TreeGRPO / DiffusionNFT</text>
  <text x="948" y="351" class="small">better credit assignment</text>
  <text x="948" y="371" class="small">and beyond reverse likelihood</text>
  <text x="948" y="389" class="tiny">Jan 2026 / ICLR 2026</text>

  <text x="60" y="470" class="small">Legend:</text>
  <text x="120" y="470" class="tiny">Blue: core online RL methods</text>
  <text x="335" y="470" class="tiny">Orange/Purple: alternative feedback routes</text>
  <text x="640" y="470" class="tiny">Red/Pink: video alignment</text>
  <text x="875" y="470" class="tiny">Green: 2026 efficiency wave</text>
</svg>
