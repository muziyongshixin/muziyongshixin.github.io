<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Diffusion RL method selection map</title>
  <desc id="desc">Method selection based on reward type and model family.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffdf7"/>
      <stop offset="100%" stop-color="#eef6ff"/>
    </linearGradient>
    <style>
      .title { font: 700 28px 'Helvetica Neue', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 15px 'Helvetica Neue', Arial, sans-serif; fill: #334155; }
      .boxTitle { font: 700 20px 'Helvetica Neue', Arial, sans-serif; fill: #0f172a; }
      .label { font: 700 16px 'Helvetica Neue', Arial, sans-serif; fill: #0f172a; }
      .body { font: 400 14px 'Helvetica Neue', Arial, sans-serif; fill: #334155; }
      .tiny { font: 400 13px 'Helvetica Neue', Arial, sans-serif; fill: #475569; }
      .arrow { stroke: #64748b; stroke-width: 3.5; fill: none; stroke-linecap: round; }
    </style>
    <marker id="arrowHead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="1200" height="560" fill="url(#bg2)"/>
  <text x="60" y="54" class="title">Which diffusion post-training route fits your feedback?</text>
  <text x="60" y="80" class="subtitle">The most useful split is not “which paper is newest”, but “what feedback do you actually have?”.</text>

  <rect x="420" y="112" width="360" height="84" rx="18" fill="#e0f2fe" stroke="#38bdf8" stroke-width="2"/>
  <text x="486" y="145" class="boxTitle">Start from the feedback signal</text>
  <text x="468" y="172" class="body">reward differentiability, preference format, and model family decide the tool</text>

  <rect x="90" y="260" width="290" height="170" rx="18" fill="#fff7ed" stroke="#fb923c" stroke-width="2"/>
  <text x="122" y="295" class="boxTitle">Differentiable reward</text>
  <text x="122" y="325" class="body">Use direct backprop:</text>
  <text x="122" y="350" class="body">DRaFT, AlignProp,</text>
  <text x="122" y="372" class="body">Video Reward Gradients</text>
  <text x="122" y="405" class="tiny">Best when the scorer can backpropagate.</text>
  <text x="122" y="426" class="tiny">Lower variance, better sample efficiency,</text>
  <text x="122" y="447" class="tiny">but heavier memory cost.</text>

  <rect x="455" y="260" width="290" height="170" rx="18" fill="#f5f3ff" stroke="#a78bfa" stroke-width="2"/>
  <text x="494" y="295" class="boxTitle">Preference pairs only</text>
  <text x="494" y="325" class="body">Use preference optimization:</text>
  <text x="494" y="350" class="body">Diffusion-DPO, D3PO</text>
  <text x="494" y="405" class="tiny">Best when you have winner / loser pairs</text>
  <text x="494" y="426" class="tiny">but do not want to train a reward model.</text>
  <text x="494" y="447" class="tiny">Needs likelihood or ELBO-style surrogates.</text>

  <rect x="820" y="260" width="290" height="170" rx="18" fill="#eff6ff" stroke="#60a5fa" stroke-width="2"/>
  <text x="848" y="295" class="boxTitle">Black-box scalar reward</text>
  <text x="848" y="325" class="body">Use online RL:</text>
  <text x="848" y="350" class="body">DDPO, DPOK</text>
  <text x="848" y="372" class="body">Flow-GRPO for flow models</text>
  <text x="848" y="405" class="tiny">Most general route, but sampling cost and</text>
  <text x="848" y="426" class="tiny">gradient variance become the main pain points.</text>
  <text x="848" y="447" class="tiny">KL regularization is usually essential.</text>

  <path d="M600 196 L235 248" class="arrow" marker-end="url(#arrowHead)"/>
  <path d="M600 196 L600 248" class="arrow" marker-end="url(#arrowHead)"/>
  <path d="M600 196 L965 248" class="arrow" marker-end="url(#arrowHead)"/>

  <rect x="430" y="470" width="340" height="54" rx="16" fill="#dcfce7" stroke="#4ade80" stroke-width="2"/>
  <text x="462" y="503" class="label">Flow matching in 2025-2026:</text>
  <text x="690" y="503" class="body">Flow-GRPO, TreeGRPO, DiffusionNFT</text>
</svg>
